# Local Kafka broker for community message pipeline (dev only)
# KRaft mode — no Zookeeper required
#
# Usage:
#   docker compose -f docker-compose.kafka.yml up -d
#   docker compose -f docker-compose.kafka.yml down
#
# Production: replace KAFKA_BROKERS in .env with your AWS MSK endpoints

services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: powermysport-kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft node identity
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"

      # Unique cluster ID — generate once with:  docker run --rm apache/kafka:3.7.0 kafka-storage.sh random-uuid
      KAFKA_CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"

      # Listener config
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"

      # Storage — required by apache/kafka image (KRaft needs an explicit log dir)
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"

      # Topic defaults
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: "3"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_LOG_RETENTION_HOURS: "24"

      # Internal topic replication (single-node dev: RF=1 is fine)
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  kafka_data:
    driver: local
