name: Deploy Server to AWS Elastic Beanstalk (Docker)

on:
  push:
    branches:
      - main
    paths:
      - "server/**"             # Only trigger when server code changes
      - ".github/workflows/deploy-server.yml"

  workflow_dispatch:            # Allow manual trigger from GitHub UI

concurrency:
  group: deploy-server-${{ github.ref }}
  cancel-in-progress: false     # Never cancel an in-flight deploy

jobs:
  # ────────────────────────────────────────────────────────────────────
  # JOB 1 — Type-check & Build Validation
  # ────────────────────────────────────────────────────────────────────
  build-check:
    name: TypeScript Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: node ./node_modules/typescript/bin/tsc --noEmit

      - name: Build TypeScript
        run: npm run build

  # ────────────────────────────────────────────────────────────────────
  # JOB 2 — Deploy to Elastic Beanstalk (Docker)
  # ────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to AWS EB (Docker)
    runs-on: ubuntu-latest
    needs: build-check          # Only deploy if type-check passes
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Install EB CLI
        run: pip install awsebcli --quiet

      # Generate a unique version label using git SHA + timestamp
      - name: Set deployment version label
        id: version
        run: |
          echo "label=github-${{ github.sha }}-$(date +%s)" >> $GITHUB_OUTPUT

      # Create the application bundle zip
      # EB Docker platform needs: Dockerfile + src/ + package*.json + .ebextensions/
      # .ebignore controls what is excluded (node_modules, dist, .env, etc.)
      - name: Create deployment bundle
        run: |
          zip -r ../deploy.zip . \
            --exclude "node_modules/*" \
            --exclude "dist/*" \
            --exclude ".env" \
            --exclude ".env.*" \
            --exclude "*.log" \
            --exclude "coverage/*" \
            --exclude ".DS_Store" \
            --exclude "debug_output.txt"

      # Upload bundle to S3 (EB uses this bucket)
      - name: Upload bundle to S3
        run: |
          aws s3 cp ../deploy.zip \
            s3://elasticbeanstalk-ap-south-1-${{ secrets.AWS_ACCOUNT_ID }}/PowerMySport-API/${{ steps.version.outputs.label }}.zip

      # Create new EB application version
      - name: Create EB application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name PowerMySport-API \
            --version-label "${{ steps.version.outputs.label }}" \
            --source-bundle S3Bucket=elasticbeanstalk-ap-south-1-${{ secrets.AWS_ACCOUNT_ID }},S3Key=PowerMySport-API/${{ steps.version.outputs.label }}.zip \
            --description "Deployed from GitHub Actions — commit ${{ github.sha }}"

      # Deploy the new version to the Docker environment
      - name: Deploy to EB environment
        run: |
          aws elasticbeanstalk update-environment \
            --application-name PowerMySport-API \
            --environment-name powermysport-api-docker \
            --version-label "${{ steps.version.outputs.label }}"

      # Poll until deployment is complete (success or failure)
      - name: Wait for deployment to complete
        run: |
          echo "Waiting for deployment to stabilize..."
          aws elasticbeanstalk wait environment-updated \
            --application-name PowerMySport-API \
            --environment-names powermysport-api-docker

      # Verify health after deployment
      - name: Verify environment health
        run: |
          STATUS=$(aws elasticbeanstalk describe-environments \
            --application-name PowerMySport-API \
            --environment-names powermysport-api-docker \
            --query "Environments[0].Health" \
            --output text)

          echo "Environment health: $STATUS"

          if [ "$STATUS" != "Green" ]; then
            echo "❌ Deployment failed — environment health is $STATUS"
            exit 1
          fi

          echo "✅ Deployment successful — environment is Green"

      # Print the environment URL for quick access
      - name: Print environment URL
        run: |
          URL=$(aws elasticbeanstalk describe-environments \
            --application-name PowerMySport-API \
            --environment-names powermysport-api-docker \
            --query "Environments[0].CNAME" \
            --output text)
          echo "🚀 Deployed to: http://$URL"
